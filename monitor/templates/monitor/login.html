{% load static %}
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 - NodeGuard</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
  <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'icons/bootstrap-icons.min.css' %}" rel="stylesheet">
  <style>
    body { background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
    .login-icon { font-size: 3rem; color: #38bdf8; text-align: center; margin-bottom: 8px; }
    .login-title { text-align: center; font-size: 1.5rem; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
    .login-sub { text-align: center; color: #64748b; font-size: .9rem; margin-bottom: 28px; }
    .form-control { background: #0f172a; border-color: #334155; color: #e2e8f0; padding: 10px 14px; }
    .form-control:focus { background: #0f172a; border-color: #38bdf8; color: #e2e8f0; box-shadow: 0 0 0 .2rem rgba(56,189,248,.2); }
    .form-label { color: #94a3b8; font-size: .9rem; }
    .btn-login { background: #0ea5e9; border: none; padding: 10px; font-weight: 600; font-size: 1rem; border-radius: 8px; width: 100%; }
    .btn-login:hover { background: #0284c7; }
    .input-group-text { background: #273549; border-color: #334155; color: #64748b; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-icon"><i class="bi bi-hdd-network"></i></div>
    <div class="login-title">NodeGuard</div>
    <div class="login-sub">網路設備監控系統</div>

    {% if messages %}
      {% for msg in messages %}
      <div class="alert alert-danger py-2 mb-3" role="alert"><i class="bi bi-exclamation-circle me-1"></i>{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">帳號</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="輸入帳號" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">密碼</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="輸入密碼" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>登入
      </button>
    </form>
  </div>
</body>
</html>
