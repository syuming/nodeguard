{% extends "monitor/base.html" %}
{% block title %}重複 IP 紀錄 - NodeGuard{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
  <h4 class="mb-0" style="color:#f1f5f9">
    <i class="bi bi-journal-text me-2" style="color:#f59e0b"></i>重複 IP 紀錄
  </h4>
  <div class="d-flex gap-2 align-items-center">
    <span style="font-size:.8rem;color:var(--text-secondary)">{{ log_file }}</span>
    <a href="/" class="btn btn-sm btn-outline-secondary">返回首頁</a>
  </div>
</div>

<div class="card">
  <div class="card-body p-0">
    {% if lines %}
    <div style="overflow-y:auto;max-height:70vh">
      <table class="table table-hover mb-0" style="font-size:.82rem;font-family:monospace">
        <tbody>
          {% for line in lines %}
          <tr>
            <td style="color:#94a3b8;white-space:pre-wrap;word-break:break-all">{{ line }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
    {% else %}
    <div class="text-center py-5">
      <i class="bi bi-check-circle display-6 d-block mb-2" style="color:#22c55e"></i>
      <div style="color:var(--text-secondary)">目前沒有重複 IP 紀錄</div>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
