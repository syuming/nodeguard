{% extends "monitor/base.html" %}
{% block title %}個人資料 - NetMonitor{% endblock %}

{% block content %}
<div class="mb-2" style="font-size:.85rem;color:#64748b">
  <a href="/" class="text-decoration-none" style="color:#64748b">
    <i class="bi bi-house me-1"></i>Dashboard
  </a>
  <span class="mx-1">/</span>
  <span style="color:#94a3b8">個人資料</span>
</div>

<div class="row justify-content-center mt-4">
  <div class="col-5">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-person-circle me-2"></i>個人資料
      </div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            <input type="text" name="{{ field.html_name }}"
                   value="{{ field.value|default:'' }}"
                   class="form-control{% if field.errors %} is-invalid{% endif %}">
            {% for error in field.errors %}
            <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}
          </div>
          {% endfor %}
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>儲存
            </button>
            <a href="/password/change/" class="btn btn-outline-warning">
              <i class="bi bi-key me-1"></i>修改密碼
            </a>
            <a href="/" class="btn btn-outline-secondary">取消</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
